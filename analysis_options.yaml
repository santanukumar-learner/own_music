include: package:flutter_lints/flutter.yaml

analyzer:
  exclude:
    - "**/*.g.dart"
    - "**/*.freezed.dart"
    - "build/**"
    # Flutter SDK was cloned into the project; never analyze it (or the scratch
    # project used to backfill platform binaries). Better: move the SDK out to
    # C:\src\flutter so it isn't inside the project at all.
    - "flutter/**"
    - "scratch_app/**"
  errors:
    # Riverpod codegen places annotations on members; silence the false positive.
    invalid_annotation_target: ignore
  language:
    strict-casts: true
    strict-raw-types: true

linter:
  rules:
    prefer_single_quotes: true
    prefer_const_constructors: true
    prefer_const_declarations: true
    avoid_print: true
    require_trailing_commas: true
    unawaited_futures: true
    use_build_context_synchronously: true
    sort_child_properties_last: true
