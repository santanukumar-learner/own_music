plugins {
    id "com.android.application"
    id "kotlin-android"
    // The Flutter Gradle Plugin must be applied after the Android and Kotlin plugins.
    id "dev.flutter.flutter-gradle-plugin"
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file("local.properties")
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader("UTF-8") { reader ->
        localProperties.load(reader)
    }
}

def flutterVersionCode = localProperties.getProperty("flutter.versionCode") ?: "1"
def flutterVersionName = localProperties.getProperty("flutter.versionName") ?: "1.0"

android {
    namespace = "com.helprevx.music_recommender"
    compileSdk = 35
    ndkVersion = "27.0.12077973"

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_17
        targetCompatibility = JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_17.toString()
    }

    defaultConfig {
        applicationId = "com.helprevx.music_recommender"
        minSdk = 26          // API 26+ per spec
        targetSdk = 35
        versionCode = flutterVersionCode.toInteger()
        versionName = flutterVersionName

        // Keep the APK small (<80 MB): ship only arm64 native libs (onnxruntime,
        // isar, just_audio). Add "armeabi-v7a"/"x86_64" here if you target older
        // 32-bit devices or the x86_64 emulator.
        ndk {
            abiFilters "arm64-v8a"
        }
    }

    buildTypes {
        release {
            // Personal app: sign release builds with the debug key so
            // `flutter build apk` works out of the box. Swap in a real keystore
            // (android/key.properties) before distributing.
            signingConfig = signingConfigs.debug

            // R8 left OFF to avoid stripping reflection-heavy native bindings
            // (onnxruntime / isar). Enable + verify keep rules in proguard-rules.pro
            // if you need the extra size savings.
            minifyEnabled = false
            shrinkResources = false
            proguardFiles getDefaultProguardFile("proguard-android-optimize.txt"), "proguard-rules.pro"
        }
    }
}

flutter {
    source = "../.."
}
